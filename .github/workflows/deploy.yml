name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # The single switch for production cutover: set the repository
          # variable DEPLOY_TARGET=prod. Unset/anything-else => github.io preview.
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
          # Public CMS OAuth worker base URL (rotatable; not a real secret —
          # it is called by the browser and ends up in the static output).
          CMS_AUTH_BASE_URL: ${{ vars.CMS_AUTH_BASE_URL }}
          # Optional per-value overrides (normally leave unset; the DEPLOY_TARGET
          # preset supplies the right values for preview vs prod).
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}
          SITE_CNAME: ${{ vars.SITE_CNAME }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
