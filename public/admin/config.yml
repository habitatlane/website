backend:
  name: github
  repo: habitatlane/website
  branch: main
  base_url: https://habitatlane-cms-auth.mattpadams.workers.dev

media_folder: public/uploads
public_folder: /uploads
publish_mode: editorial_workflow

collections:
  - name: home
    label: Home Page
    files:
      - label: Home Page
        name: home
        file: src/content/home/index.md
        fields:
          - { label: Title, name: title, widget: string, default: Home }
          - label: Sections
            name: sections
            widget: list
            typeKey: type
            summary: "{{type}}"
            types:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string, required: false }
                  - { label: Body, name: body, widget: text, required: false }
                  - label: Primary CTA
                    name: primaryCta
                    widget: object
                    required: false
                    fields:
                      - { label: Label, name: label, widget: string, required: false }
                      - { label: URL, name: url, widget: string, required: false }
                      - { label: Opens in new tab, name: external, widget: boolean, default: false, required: false }
                  - label: Secondary CTA
                    name: secondaryCta
                    widget: object
                    required: false
                    fields:
                      - { label: Label, name: label, widget: string, required: false }
                      - { label: URL, name: url, widget: string, required: false }
                      - { label: Opens in new tab, name: external, widget: boolean, default: false, required: false }
                  - { label: Service Text, name: serviceText, widget: string, required: false }
                  - { label: Image, name: image, widget: image, required: false }
                  - { label: Image Alt Text, name: imageAlt, widget: string, required: false }
              - label: How We Help
                name: howWeHelp
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string, required: false }
                  - { label: Card CTA Label, name: cardCtaLabel, widget: string, required: false }
                  - label: Programs
                    name: programs
                    widget: list
                    required: false
                    summary: "{{fields.title}}"
                    fields:
                      - { label: Title, name: title, widget: string, required: false }
                      - { label: Body, name: body, widget: text, required: false }
                      - { label: URL, name: href, widget: string, required: false }
                      - { label: Opens in new tab, name: external, widget: boolean, default: false, required: false }
              - label: Impact Band
                name: impactBand
                widget: object
                fields:
                  - { label: Heading, name: heading, widget: string, required: false }
                  - label: Stats
                    name: stats
                    widget: list
                    required: false
                    summary: "{{fields.value}} {{fields.label}}"
                    fields:
                      - { label: Value, name: value, widget: string, required: false }
                      - { label: Label, name: label, widget: string, required: false }
                  - { label: Note, name: note, widget: string, required: false }
              - label: Featured Campaign
                name: featuredCampaign
                widget: object
                fields: []
              - label: Events Strip
                name: eventsStrip
                widget: object
                fields: []
              - label: Newsletter
                name: newsletter
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Heading, name: heading, widget: string, required: false }
                  - { label: Body, name: body, widget: text, required: false }
                  - { label: Form Action URL, name: formAction, widget: string, required: false }
                  - { label: Email Label, name: emailLabel, widget: string, required: false }
                  - { label: Email Placeholder, name: emailPlaceholder, widget: string, required: false }
                  - { label: Button Label, name: buttonLabel, widget: string, required: false }
                  - { label: Note, name: note, widget: string, required: false }

  - name: pages
    label: Pages
    folder: src/content/pages
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: events
    label: Events
    folder: src/content/events
    create: true
    slug: "{{start | date('YYYY-MM-DD')}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Start, name: start, widget: datetime }
      - { label: End, name: end, widget: datetime, required: false }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Summary, name: summary, widget: text }
      - { label: Registration URL, name: registrationUrl, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: campaigns
    label: Campaigns
    folder: src/content/campaigns
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Goal Amount, name: goalAmount, widget: number, value_type: int, required: false }
      - { label: Raised Amount, name: raisedAmount, widget: number, value_type: int, required: false }
      - { label: CTA Label, name: ctaLabel, widget: string, default: Donate }
      - { label: CTA URL, name: ctaUrl, widget: string }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: imageAlt, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: programs
    label: Programs
    folder: src/content/programs
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Order, name: order, widget: number, value_type: int, default: 99 }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: staff
    label: Staff and Board
    folder: src/content/staff
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - label: Group
        name: group
        widget: select
        default: staff
        options:
          - { label: Staff, value: staff }
          - { label: Board, value: board }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Order, name: order, widget: number, value_type: int, default: 99 }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Bio, name: body, widget: markdown, required: false }

  - name: news
    label: News
    folder: src/content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: imageAlt, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
